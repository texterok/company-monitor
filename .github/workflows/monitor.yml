name: Monitor company reports

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check companies
        id: check
        run: |
          ADESK=$(curl -s "https://company-dashboard-billowing-darkness-2208.fly.dev/api/company/7415098349" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['finance']['years'][-1])")
          MAKSIMUM=$(curl -s "https://company-dashboard-billowing-darkness-2208.fly.dev/api/company/3233502746" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['finance']['years'][-1])")
          echo "adesk_year=${ADESK}" >> "$GITHUB_OUTPUT"
          echo "maksimum_year=${MAKSIMUM}" >> "$GITHUB_OUTPUT"

      - name: Notify and update state
        env:
          ADESK_NOW: ${{ steps.check.outputs.adesk_year }}
          MAKSIMUM_NOW: ${{ steps.check.outputs.maksimum_year }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ADESK_PREV=$(cat state/adesk.txt 2>/dev/null || echo 'none')
          MAKSIMUM_PREV=$(cat state/maksimum.txt 2>/dev/null || echo 'none')

          CHANGED=false
          MSG=""

          if [ "${ADESK_PREV}" != "none" ] && [ "${ADESK_NOW}" != "${ADESK_PREV}" ]; then
            CHANGED=true
            MSG="${MSG}Адеск (ИНН 7415098349): было ${ADESK_PREV}, стало ${ADESK_NOW}\n"
          fi
          if [ "${MAKSIMUM_PREV}" != "none" ] && [ "${MAKSIMUM_NOW}" != "${MAKSIMUM_PREV}" ]; then
            CHANGED=true
            MSG="${MSG}Максимум Веб (ИНН 3233502746): было ${MAKSIMUM_PREV}, стало ${MAKSIMUM_NOW}\n"
          fi

          if [ "${CHANGED}" = "true" ]; then
            BODY="Появились обновления в отчётности:\n\n${MSG}\nСмотреть: https://company-dashboard-billowing-darkness-2208.fly.dev/compare.html"
            echo -e "${BODY}" | curl -s \
              --url "smtps://smtp.gmail.com:465" \
              --ssl-reqd \
              --user "${GMAIL_USER}:${GMAIL_PASS}" \
              --mail-from "${GMAIL_USER}" \
              --mail-rcpt "iplaxa@mail.ru" \
              --upload-file - \
              --header "Subject: Новая отчётность компаний" \
              --header "From: Мониторинг <${GMAIL_USER}>" \
              --header "To: iplaxa@mail.ru" \
              --header "Content-Type: text/plain; charset=utf-8"
          fi

          mkdir -p state
          echo "${ADESK_NOW}" > state/adesk.txt
          echo "${MAKSIMUM_NOW}" > state/maksimum.txt

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/
          git diff --staged --quiet || git commit -m "chore: update state $(date +%Y-%m-%d)"
          git push
